{% extends "base.html" %}
{% block title %}Admin Login - AgriSmart AI{% endblock %}
{% block content %}
<section class="section page-hero compact-hero">
    <div class="container narrow">
        <div class="info-card reveal login-card">
            <span class="eyebrow">Secure Entry</span>
            <h2 data-en="Admin Login System" data-ta="நிர்வாகி உள்நுழைவு அமைப்பு">Admin Login System</h2>
            <p>Default credentials: <strong>admin / admin123</strong></p>
            <form class="portal-form compact-form" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Login to Admin Dashboard</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
